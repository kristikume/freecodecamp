<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Drum Machine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container" id="drum-machine">
      <div id="pad-bank">
        <button class="drum-pad" id="Heater-1" data-sound="Heater 1">
          Q
          <audio
            class="clip"
            id="Q"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-1.mp3"
          ></audio>
        </button>
        <button class="drum-pad" id="Heater-2" data-sound="Heater 2">
          W
          <audio
            class="clip"
            id="W"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-2.mp3"
          ></audio>
        </button>
        <button class="drum-pad" id="Heater-3" data-sound="Heater 3">
          E
          <audio
            class="clip"
            id="E"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-3.mp3"
          ></audio>
        </button>
        <button class="drum-pad" id="Heater-4" data-sound="Heater 4">
          A
          <audio
            class="clip"
            id="A"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-4_1.mp3"
          ></audio>
        </button>
        <button class="drum-pad" id="Clap" data-sound="Clap">
          S
          <audio
            class="clip"
            id="S"
            src="https://cdn.freecodecamp.org/curriculum/drum/Heater-6.mp3"
          ></audio>
        </button>
        <button class="drum-pad" id="Open-HH" data-sound="Open-HH">
          D
          <audio
            class="clip"
            id="D"
            src="https://cdn.freecodecamp.org/curriculum/drum/Dsc_Oh.mp3"
          ></audio>
        </button>
        <button class="drum-pad" id="Kick-n'-Hat" data-sound="Kick-n'-Hat">
          Z
          <audio
            class="clip"
            id="Z"
            src="https://cdn.freecodecamp.org/curriculum/drum/Kick_n_Hat.mp3"
          ></audio>
        </button>
        <button class="drum-pad" id="Kick" data-sound="Kick">
          X
          <audio
            class="clip"
            id="X"
            src="https://cdn.freecodecamp.org/curriculum/drum/RP4_KICK_1.mp3"
          ></audio>
        </button>
        <button class="drum-pad" id="Closed-HH" data-sound="Closed-HH">
          C
          <audio
            class="clip"
            id="C"
            src="https://cdn.freecodecamp.org/curriculum/drum/Cev_H2.mp3"
          ></audio>
        </button>
      </div>
      <div class="controls-container">
        <div class="control power-control">
          <label class="select">
            <span>Power: <span id="power-status">On</span></span>
            <span class="toggle-container">
              <input type="checkbox" id="power-toggle" checked="" />
              <span class="slider"></span>
            </span>
          </label>
        </div>
        <p id="display"></p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
